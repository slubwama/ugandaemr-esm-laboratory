name: UgandaEMR CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types:
      - created

env:
  TURBO_API: "http://127.0.0.1:9080"
  TURBO_TOKEN: "turbo-token"
  TURBO_TEAM: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate

      - name: 💾 Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: 📦 Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: 🚀 Setup local cache server for Turborepo
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          server-token: ${{ env.TURBO_TOKEN }}

      - name: ✅ Verify
        run: yarn verify

      - name: 🛠️ Build
        run: yarn turbo run build --color --concurrency=5

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist
          overwrite: true

  pre_release:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v4

      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate

      - name: 💾 Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: 📦 Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: 🚀 Setup local cache server for Turborepo
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          server-token: ${{ env.TURBO_TOKEN }}

      - name: 🏷️ Version
        run: yarn version "$(node -e "console.log(require('semver').inc(require('./package.json').version, 'patch'))")-pre.${{ github.run_number }}"

      - name: 🛠️ Build
        run: yarn turbo run build --color --concurrency=5

      - name: ✅ Verify package contains routes.json
        run: |
          yarn pack --out package.tgz
          tar -tf package.tgz | grep -E '^package/dist/routes.json$' || (echo "routes.json missing from dist directory" && exit 1)

      - name: Commit prerelease version
        run: |
          git config user.email "<>"
          git config user.name "UgandaEMR CI"
          git add .
          git commit -m "Prerelease version" --no-verify

      - name: 🚢 Publish prerelease
        run: |
          yarn config set npmAuthToken "${NPM_AUTH_TOKEN}"
          yarn npm publish --access public --tag next
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Cleanup tarball
        if: always()
        run: rm -f package.tgz

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist
          overwrite: true

  release:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'release' }}

    steps:
      - uses: actions/checkout@v4

      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4

      - name: 🟢 Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate

      - name: 💾 Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: 📦 Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: 🛠️ Build
        run: yarn turbo run build --color

      - name: ✅ Verify package contains routes.json
        run: |
          yarn pack --out package.tgz
          tar -tf package.tgz | grep -E '^package/dist/routes.json$' || (echo "routes.json missing from dist directory" && exit 1)

      - name: 🚢 Publish
        run: |
          yarn config set npmAuthToken "${NPM_AUTH_TOKEN}"
          yarn npm publish --access public
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Cleanup tarball
        if: always()
        run: rm -f package.tgz
